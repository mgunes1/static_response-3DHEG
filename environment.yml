name: heg-response
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python>=3.10

  # Core-scientific stack
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - h5py>=3.8

  # Jupyter
  - jupyterlab>=4.0
  - ipykernel>=6.0

  # pip-only packages
  - pip
  - pip:
    - SciencePlots>=2.1
    # QMCPACK output parser (not on PyPI or conda-forge)
    - git+https://github.com/Paul-St-Young/harvest_qmcpack.git
